<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="style11.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- фон профиля -->
    <img src="fonPRFL.png" alt="bg" class="bg-cover">

    <div class="site-content">
        <header>
            <a href="index.html">
                <div class="glass">
                    <p class="Back">Back</p>
                </div>
            </a>
            <a href="#">
                <div class="home">
                    <p class="Back">Profile</p>
                </div>
            </a>
            
            <div class="burger-menu" id="burgerMenu">
                <div class="burger-line"></div>
                <div class="burger-line"></div>
                <div class="burger-line"></div>
            </div>

            <div class="exit" id="exitMenu">
                <a href="auth.html"><div class="exx"><p class="Back">SIGN IN</p></div></a>
                <a href="auth.html"><div class="exx"><p class="Back">LOG IN</p></div></a>
            </div>
        </header>

        <main class="profile-main">
            <div class="profile-container">
                <!-- левая колонка навигация -->
                <div class="profile-nav">
                    <a href="index.html" class="nav-card">HOME</a>
                    <a href="Profile.html" class="nav-card">GALLARY</a>
                </div>

                <!-- средняя колонка имя и описание -->
                <div class="profile-info">
                    <div class="info-field">
                        <label class="field-label">Name</label>
                        <input type="text" id="profileName" class="field-input" placeholder="Ваше имя">
                    </div>
                    <div class="info-field">
                        <label class="field-label">About me</label>
                        <textarea id="profileBio" class="field-textarea" placeholder="Расскажите о себе..."></textarea>
                    </div>
                    <button id="saveProfile" class="save-btn">Сохранить</button>
                </div>

                <!-- правая колонкаватар -->
                <div class="profile-avatar">
                    <div class="avatar-box" id="avatarBox">
                        <span class="avatar-placeholder">AVATAR</span>
                        <img id="avatarImage" src="" alt="Avatar" class="avatar-img hidden">
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" hidden>
                    <label for="avatarInput" class="avatar-upload-btn">Загрузить фото</label>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
    
    
</body>
</html>
